<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Signboard & Advertising</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f6f9; color: #333; }
        header { background-color: #1a252f; color: white; padding: 20px; text-align: center; }
        
        .upload-section { 
            background-color: white; max-width: 500px; margin: 40px auto; padding: 30px; 
            border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; 
        }
        
        input[type="text"], input[type="file"] {
            width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box;
        }
        
        .upload-btn { 
            background-color: #27ae60; color: white; padding: 12px 25px; border: none; 
            border-radius: 6px; cursor: pointer; width: 90%; font-size: 16px; font-weight: bold;
        }
        .upload-btn:hover { background-color: #219150; }

        .gallery-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>سلطان دعاية وإعلان</h1>
    </header>

    <section class="upload-section">
        <h3>لوحة التحكم (خاص بالمالك)</h3>
        <input type="text" id="projectTitle" placeholder="عنوان العمل">
        <input type="file" id="projectImage" accept="image/*">
        <button class="upload-btn" onclick="secureUpload()">نشر المشروع</button>
    </section>

    <div class="gallery-container">
        <div class="grid" id="galleryGrid"></div>
    </div>

    <script>
        function secureUpload() {
            var title = document.getElementById('projectTitle').value;
            var fileInput = document.getElementById('projectImage');
            
            if(!title || fileInput.files.length === 0) return alert("الرجاء ملء البيانات!");

            var password = prompt("أدخل رمز المرور السري:");
            if (password === "Sultan2026") {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var grid = document.getElementById('galleryGrid');
                    var newCard = document.createElement('div');
                    newCard.className = 'card';
                    newCard.innerHTML = `<img src="${e.target.result}"> <p>${title}</p>`;
                    grid.prepend(newCard); // تازہ کام سب سے پہلے دکھانے کے لیے
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                alert("رمز المرور خاطئ!");
            }
        }
    </script>
</body>
</html>
