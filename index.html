<!DOCTYPE html>
<html lang="ae" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Signboard & Advertising | سلطان دعاية وإعلان</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }
        header {
            background-color: #1a252f;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 24px; font-weight: bold; color: #f39c12; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .hero { background-color: #2c3e50; color: white; text-align: center; padding: 80px 20px; }
        .hero h1 { font-size: 44px; margin-bottom: 10px; }
        
        .upload-section { background-color: white; max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border: 2px dashed #f39c12; }
        .upload-btn { background-color: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; }
        
        .gallery-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-text { padding: 15px; font-weight: bold; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; padding-top: 50px; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); }
        .modal-content { margin: auto; display: block; max-width: 80%; max-height: 80%; border-radius: 5px; }
        .close { position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; cursor: pointer; }

        footer { background-color: #1a252f; color: white; text-align: center; padding: 40px 20px; margin-top: 50px; }
        .contact-btn { display: inline-block; background-color: #f39c12; color: white; padding: 12px 30px; text-decoration: none; border-radius: 25px; font-size: 18px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">سلطان دعاية وإعلان</div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#gallery">معرض الأعمال</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Sultan Signboard & Advertising</h1>
        <p>Premium 3D LED Signages & ACP Cladding Solutions</p>
    </section>

    <section class="upload-section" id="upload">
        <h2>لوحة التحكم (خاص بالمالك)</h2>
        <form id="uploadForm" style="display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px;">
            <input type="text" id="projectTitle" placeholder="عنوان العمل" style="width: 80%; padding: 10px;" required>
            <input type="file" id="projectImage" accept="image/*" required>
            <button type="button" onclick="secureUpload()" class="upload-btn">نشر المشروع</button>
        </form>
    </section>

    <section class="gallery-container" id="gallery">
        <div class="grid" id="galleryGrid">
            </div>
    </section>

    <div id="myModal" class="modal">
        <span class="close" onclick="document.getElementById('myModal').style.display='none'">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <footer>
        <a href="https://wa.me/966590479533" class="contact-btn">📞 التواصل عبر واتساب</a>
    </footer>

    <script>
        function secureUpload() {
            var title = document.getElementById('projectTitle').value;
            var fileInput = document.getElementById('projectImage');
            
            if(!title || fileInput.files.length === 0) return alert("الرجاء ملء البيانات!");

            var password = prompt("أدخل رمز المرور السري:");
            if (password === "Sultan2026") {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var grid = document.getElementById('galleryGrid');
                    var newCard = document.createElement('div');
                    newCard.className = 'card';
                    newCard.innerHTML = `<img src="${e.target.result}" onclick="openModal(this.src)"> <div class="card-text">${title}</div>`;
                    grid.insertBefore(newCard, grid.firstChild);
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                alert("رمز المرور خاطئ!");
            }
        }

        function openModal(src) {
            var modal = document.getElementById('myModal');
            var modalImg = document.getElementById('fullImage');
            modal.style.display = "block";
            modalImg.src = src;
        }
    </script>
</body>
</html>
